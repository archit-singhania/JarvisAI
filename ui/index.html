<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Daisy AI</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--surface:#0d1117;--card:#111827;--border:#1e293b;
  --cyan:#00c8ff;--cyan-dim:#00c8ff15;--pink:#f472b6;
  --green:#34d399;--amber:#fbbf24;--red:#f87171;
  --text:#e2e8f0;--muted:#64748b;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}

/* orb wrapper — centres then slides up when chat appears */
#ow{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:22px;
  transition:top .45s cubic-bezier(.4,0,.2,1),transform .45s cubic-bezier(.4,0,.2,1);
  z-index:10;pointer-events:none;
}
#ow.up{top:128px;transform:translate(-50%,0)}

/* orb */
#orb{
  width:86px;height:86px;border-radius:50%;
  background:radial-gradient(circle at 34% 34%,#00e5ff,#0070ff 52%,#5500ff);
  box-shadow:0 0 32px #00c8ff35,0 0 64px #0060ff18;
  cursor:pointer;pointer-events:all;
  transition:transform .18s,box-shadow .25s;
  position:relative;flex-shrink:0;
}
#orb:hover{transform:scale(1.05)}
#orb::before,#orb::after{
  content:'';position:absolute;inset:-10px;border-radius:50%;
  border:1px solid #00c8ff;opacity:0;
  animation:ring 2.6s ease-out infinite;
}
#orb::after{animation-delay:1.3s}
@keyframes ring{0%{transform:scale(.8);opacity:.5}100%{transform:scale(1.5);opacity:0}}

/* orb states */
#orb.L{animation:oP 1.1s ease-in-out infinite;box-shadow:0 0 52px #00c8ffaa,0 0 100px #0060ff80}
#orb.S{animation:oW .55s ease-in-out infinite alternate;
  background:radial-gradient(circle at 34% 34%,#f472b6,#8b5cf6 52%,#0070ff);
  box-shadow:0 0 52px #f472b680,0 0 100px #8b5cf670}
#orb.T{animation:oR 1.8s linear infinite;box-shadow:0 0 32px #fbbf2460,0 0 64px #fbbf2420}
#orb.E{background:radial-gradient(circle at 34% 34%,#f87171,#dc2626 60%,#7f1d1d);box-shadow:0 0 32px #f8717160}
@keyframes oP{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes oW{0%{transform:scale(1)}100%{transform:scale(1.07) scaleY(1.09)}}
@keyframes oR{from{filter:hue-rotate(0deg)}to{filter:hue-rotate(360deg)}}

/* voice bars */
#vb{display:flex;align-items:center;gap:2px;height:26px;opacity:0;transition:opacity .22s}
#vb.on{opacity:1}
.vb{width:3px;background:var(--cyan);border-radius:2px;min-height:3px;transition:height .05s}

/* status */
#sl{font-size:12px;color:var(--muted);letter-spacing:.4px;text-align:center;
  transition:color .22s;min-height:15px;pointer-events:none}
#sl.L{color:var(--cyan)}#sl.S{color:var(--pink)}#sl.T{color:var(--amber)}

/* transcript pop */
#tb{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:7px 14px;font-size:13px;color:var(--muted);max-width:310px;text-align:center;
  opacity:0;transform:translateY(5px);transition:opacity .22s,transform .22s;pointer-events:none}
#tb.on{opacity:1;transform:translateY(0)}
#tb .y{color:var(--text);font-size:11px;margin-bottom:2px}

/* chat panel */
#chat{
  position:fixed;top:0;left:0;right:0;bottom:68px;
  overflow-y:auto;padding:18px 14px 10px;
  display:flex;flex-direction:column;gap:7px;
  opacity:0;pointer-events:none;transition:opacity .32s;
}
#chat.on{opacity:1;pointer-events:all}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sp{height:182px;flex-shrink:0}

/* bubbles */
.bb{max-width:74%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.65;animation:up .19s ease}
@keyframes up{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.bb.U{align-self:flex-end;background:linear-gradient(135deg,#1e3a5f,#1e2d4a);
  border:1px solid #2d4a7a;border-bottom-right-radius:3px}
.bb.A{align-self:flex-start;background:var(--card);
  border:1px solid var(--border);border-bottom-left-radius:3px}
.bb.A.st::after{content:"▋";color:var(--cyan);animation:cr .65s step-end infinite}
@keyframes cr{0%,100%{opacity:1}50%{opacity:0}}
.bb.SY{align-self:center;background:transparent;border:1px solid var(--border);
  color:var(--muted);font-size:10px;padding:2px 10px;border-radius:18px}
.bb.AL{align-self:flex-start;max-width:82%;
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  border:1px solid #f59e0b40;border-left:3px solid var(--amber);border-bottom-left-radius:3px}
.bb.AL .at{font-size:10px;color:var(--amber);margin-bottom:3px;font-weight:600;letter-spacing:.4px}
.bb .lb{font-size:10px;color:var(--muted);margin-bottom:2px;letter-spacing:.4px;text-transform:uppercase}
.bb.A .lb{color:var(--cyan)}

/* bottom bar */
#bar{
  position:fixed;bottom:0;left:0;right:0;height:68px;
  background:linear-gradient(to top,var(--bg) 52%,transparent);
  display:flex;align-items:center;justify-content:center;gap:10px;padding:0 18px;
}
.ib{background:var(--card);border:1px solid var(--border);color:var(--muted);
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:14px;transition:all .16s;flex-shrink:0}
.ib:hover{color:var(--text);border-color:var(--cyan);background:var(--cyan-dim)}
.ib.on{color:var(--cyan);border-color:var(--cyan);background:var(--cyan-dim)}
.ib.rd{color:var(--red);border-color:var(--red)}.ib.rd:hover{background:#f8717112}
#tw{flex:1;max-width:440px;position:relative;display:flex;align-items:center}
#ti{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);
  padding:8px 34px 8px 13px;border-radius:22px;font-size:13px;outline:none;transition:border-color .16s}
#ti:focus{border-color:var(--cyan)}
#ti::placeholder{color:var(--muted)}
#sb{position:absolute;right:7px;background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:14px;padding:3px;transition:color .16s}
#sb:hover{color:var(--cyan)}

/* connection */
#cd{position:fixed;top:13px;right:13px;font-size:10px;color:var(--muted);
  display:flex;align-items:center;gap:5px}
#cd .d{width:6px;height:6px;border-radius:50%;background:var(--muted)}
#cd.ok .d{background:var(--green);box-shadow:0 0 5px var(--green)}
#cd.er .d{background:var(--red)}

/* code panel */
#cp{position:fixed;right:0;top:0;bottom:68px;width:270px;
  background:var(--surface);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .26s ease;overflow-y:auto;padding:13px}
#cp.on{transform:translateX(0)}
.cph{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.cpx{cursor:pointer;font-size:14px}.cpx:hover{color:var(--text)}
.cpf{font-size:11px;color:var(--cyan);margin-bottom:6px;word-break:break-all}
.cpb{width:100%;background:var(--cyan);color:var(--bg);border:none;
  padding:8px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;
  margin-top:8px;transition:opacity .14s}.cpb:hover{opacity:.85}
</style>
</head>
<body>

<div id="cd"><div class="d"></div><span id="cl">Connecting</span></div>

<div id="chat"><div class="sp"></div></div>

<div id="ow">
  <div id="vb"></div>
  <div id="orb" onclick="orbClick()" title="Click to speak or stop"></div>
  <div id="sl">Always listening</div>
  <div id="tb"></div>
</div>

<div id="bar">
  <div class="ib" id="cpbtn" onclick="toggleCP()" title="Code panel">📁</div>
  <div id="tw">
    <input id="ti" placeholder="Ask Daisy anything…" onkeydown="if(event.key==='Enter')sendTxt()"/>
    <button id="sb" onclick="sendTxt()">➤</button>
  </div>
  <div class="ib on" id="vbtn" onclick="toggleVoice()" title="Toggle voice">🔊</div>
  <div class="ib rd" onclick="stopAll()" title="Stop Daisy">⛔</div>
  <div class="ib" onclick="clearAll()" title="Clear chat">🗑</div>
</div>

<div id="cp">
  <div class="cph"><span>CODE CONTEXT</span><span class="cpx" onclick="closeCP()">✕</span></div>
  <div id="cpf" class="cpf">No file tracked yet</div>
  <button class="cpb" onclick="askCode()">Analyze current file</button>
</div>

<script>
// ═══ state ════════════════════════════════════════════════════════
let ws=null, voiceMode=true, hasChat=false;
let mediaRecorder=null, audioChunks=[];
let audioQueue=[], isPlaying=false, activeAudio=null;
let streamBubble=null, streamContent='';
let vadStream=null, vadAnalyser=null, vadActive=false;
let vadRecording=false, vadSilTimer=null, vadStart=0;
let ttimer=null;

// VAD tuning — adjust if too sensitive or misses speech
const VAD_ON   = 0.018;   // RMS to start recording
const VAD_OFF  = 0.012;   // RMS to start silence countdown
const VAD_STOP = 0.022;   // RMS to interrupt Daisy mid-speech
const SIL_MS   = 900;     // silence before auto-send
const MIN_MS   = 350;     // minimum utterance length
const BARS     = 26;

// ═══ init ══════════════════════════════════════════════════════════
window.onload = () => { buildBars(); connect(); initVAD(); };

// ═══ bars ══════════════════════════════════════════════════════════
function buildBars(){
  const c=document.getElementById('vb');
  for(let i=0;i<BARS;i++){const b=document.createElement('div');b.className='vb';b.style.height='3px';c.appendChild(b);}
}
function animBars(rms){
  document.querySelectorAll('.vb').forEach(b=>{ b.style.height=(3+Math.random()*Math.max(3,rms*44))+'px'; });
}

// ═══ VAD — always listening ════════════════════════════════════════
async function initVAD(){
  try{
    vadStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    const ctx=new AudioContext();
    const src=ctx.createMediaStreamSource(vadStream);
    vadAnalyser=ctx.createAnalyser(); vadAnalyser.fftSize=512;
    src.connect(vadAnalyser);
    vadActive=true; st('Always listening','');
    requestAnimationFrame(vloop);
  }catch(e){ st('Mic needed',''); addSys('Allow microphone access for always-listening mode.'); }
}

function vloop(){
  requestAnimationFrame(vloop);
  if(!vadAnalyser) return;
  const buf=new Float32Array(vadAnalyser.fftSize);
  vadAnalyser.getFloatTimeDomainData(buf);
  const rms=Math.sqrt(buf.reduce((s,v)=>s+v*v,0)/buf.length);

  // ── KEY: interrupt Daisy when you start speaking ──
  if(isPlaying && rms > VAD_STOP){
    stopAll();
    return;
  }

  const vb=document.getElementById('vb');
  if(rms > VAD_ON*0.5){ vb.classList.add('on'); animBars(rms); }
  else vb.classList.remove('on');

  if(!vadRecording && !isPlaying && rms > VAD_ON){
    startRec();
  } else if(vadRecording && rms < VAD_OFF){
    if(!vadSilTimer) vadSilTimer=setTimeout(()=>{
      const d=Date.now()-vadStart;
      d>MIN_MS ? stopRec() : cancelRec();
    }, SIL_MS);
  } else if(vadRecording && rms >= VAD_ON){
    if(vadSilTimer){ clearTimeout(vadSilTimer); vadSilTimer=null; }
  }
}

async function startRec(){
  if(vadRecording||isPlaying) return;
  vadRecording=true; vadStart=Date.now(); audioChunks=[];
  const mime=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':
             MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'';
  mediaRecorder=new MediaRecorder(vadStream, mime?{mimeType:mime}:{});
  mediaRecorder.ondataavailable=e=>{ if(e.data?.size>0) audioChunks.push(e.data); };
  mediaRecorder.start(80);
  setOrb('L'); st('Listening…','L');
}

function stopRec(){
  if(!vadRecording||!mediaRecorder) return;
  vadRecording=false; vadSilTimer=null;
  mediaRecorder.onstop=async()=>{
    const blob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});
    if(blob.size>500 && ws?.readyState===1){
      setOrb('T'); st('Transcribing…','T');
      const b64=await b2b(blob);
      ws.send(JSON.stringify({type:'audio',audio_b64:b64}));
    } else resetOrb();
  };
  mediaRecorder.stop();
}

function cancelRec(){
  if(!vadRecording||!mediaRecorder) return;
  vadRecording=false; vadSilTimer=null;
  mediaRecorder.onstop=()=>{};
  try{ mediaRecorder.stop(); }catch(_){}
  resetOrb();
}

// ═══ WebSocket ═════════════════════════════════════════════════════
function connect(){
  ws=new WebSocket('ws://localhost:8000/ws');
  ws.onopen=()=>conn('ok','Online');
  ws.onclose=()=>{ conn('er','Offline'); setTimeout(connect,3000); };
  ws.onerror=()=>conn('er','Error');
  ws.onmessage=e=>handle(JSON.parse(e.data));
}

function handle(d){
  switch(d.type){

    // ── streaming text ──────────────────────────────────────────
    case 'stream_start':
      streamContent=''; streamBubble=mkBubble('A','',true);
      setOrb('S'); st('Speaking…','S'); showChat(); break;

    case 'stream_chunk':
      streamContent+=d.content;
      if(streamBubble) streamBubble.querySelector('.body').textContent=streamContent;
      scrollBot(); break;

    case 'stream_end':
      // content is empty string — text already shown via chunks
      if(streamBubble){ streamBubble.classList.remove('st'); streamBubble=null; }
      if(!isPlaying) resetOrb();
      scrollBot(); break;

    case 'stream_interrupted':
      if(streamBubble){ streamBubble.querySelector('.body').textContent+=' [stopped]'; streamBubble.classList.remove('st'); streamBubble=null; }
      clearQ(); resetOrb(); break;

    // ── audio ────────────────────────────────────────────────────
    case 'audio_chunk':
      if(voiceMode && d.audio_b64) enq(d.audio_b64, d.audio_format||'mp3'); break;

    // ── voice pipeline ───────────────────────────────────────────
    case 'stt_start': setOrb('T'); st('Transcribing…','T'); break;

    case 'transcript':
      showTB(d.content); mkBubble('U',d.content); showChat(); break;

    case 'stt_error': resetOrb(); addSys('Could not understand — try again'); break;

    // ── single-shot (tools / non-streaming) ─────────────────────
    // FIX: one event only — no double render
    case 'response':
      mkBubble('A',d.content); showChat(); scrollBot();
      if(!isPlaying) resetOrb(); break;

    // ── misc ─────────────────────────────────────────────────────
    case 'interrupted': clearQ(); resetOrb(); break;
    case 'wake_detected': setOrb('L'); st('Listening…','L'); break;
    case 'reminder': mkAlert('⏰ Reminder',d.content); break;
    case 'code_interrupt':
    case 'code_feedback':
      mkAlert('💡 Daisy noticed',d.content);
      if(voiceMode && d.audio_b64) enq(d.audio_b64, d.audio_format||'mp3');
      if(d.filename) document.getElementById('cpf').textContent=d.filename;
      showChat(); break;

    case 'cleared':
      document.getElementById('chat').innerHTML='<div class="sp"></div>';
      hasChat=false;
      document.getElementById('ow').classList.remove('up');
      document.getElementById('chat').classList.remove('on');
      clearQ(); resetOrb(); break;
  }
}

// ═══ audio queue ═══════════════════════════════════════════════════
function enq(b64,fmt){
  audioQueue.push({b64,fmt});
  if(!isPlaying) playNext();
}
function playNext(){
  if(!audioQueue.length){ isPlaying=false; if(!vadRecording) resetOrb(); return; }
  isPlaying=true; setOrb('S'); st('Speaking…','S');
  const{b64,fmt}=audioQueue.shift();
  const mime=fmt==='wav'?'audio/wav':'audio/mpeg';
  try{
    const bytes=atob(b64), arr=new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
    const url=URL.createObjectURL(new Blob([arr],{type:mime}));
    activeAudio=new Audio(url);
    activeAudio.onended=()=>{ URL.revokeObjectURL(url); activeAudio=null; playNext(); };
    activeAudio.onerror=()=>{ URL.revokeObjectURL(url); activeAudio=null; playNext(); };
    activeAudio.play().catch(()=>playNext());
  }catch(_){ playNext(); }
}
function clearQ(){
  audioQueue=[];
  if(activeAudio){ try{ activeAudio.pause(); }catch(_){} activeAudio=null; }
  isPlaying=false;
}

// ═══ text send ══════════════════════════════════════════════════════
function sendTxt(){
  const el=document.getElementById('ti'), t=el.value.trim();
  if(!t||!ws||ws.readyState!==1) return;
  mkBubble('U',t); showChat();
  ws.send(JSON.stringify({type:'text',content:t,tts:voiceMode}));
  el.value='';
}

function stopAll(){
  clearQ(); cancelRec();
  if(ws?.readyState===1) ws.send(JSON.stringify({type:'interrupt'}));
  resetOrb();
}
function clearAll(){ clearQ(); if(ws?.readyState===1) ws.send(JSON.stringify({type:'clear'})); }
function toggleVoice(){
  voiceMode=!voiceMode;
  const b=document.getElementById('vbtn');
  b.textContent=voiceMode?'🔊':'🔇';
  b.className=voiceMode?'ib on':'ib';
}
function orbClick(){
  if(isPlaying){ stopAll(); return; }
  if(vadRecording){ stopRec(); return; }
  if(vadActive) startRec();
}

// ═══ code panel ════════════════════════════════════════════════════
function toggleCP(){ document.getElementById('cp').classList.toggle('on'); document.getElementById('cpbtn').classList.toggle('on'); }
function closeCP(){ document.getElementById('cp').classList.remove('on'); document.getElementById('cpbtn').classList.remove('on'); }
function askCode(){
  if(!ws||ws.readyState!==1) return;
  ws.send(JSON.stringify({type:'text',content:'Review my current code. What are the top issues or improvements?',tts:voiceMode}));
  addSys('Analyzing…');
}

// ═══ orb / status helpers ══════════════════════════════════════════
function setOrb(s){ document.getElementById('orb').className=s; }
function resetOrb(){ document.getElementById('orb').className=''; st('Always listening',''); }
function st(t,c){ const e=document.getElementById('sl'); e.textContent=t; e.className=c||''; }

// ═══ transcript bubble ══════════════════════════════════════════════
function showTB(text){
  const b=document.getElementById('tb');
  b.innerHTML=`<div class="y">You said</div>${text}`;
  b.classList.add('on');
  clearTimeout(ttimer);
  ttimer=setTimeout(()=>b.classList.remove('on'),3400);
}

// ═══ chat helpers ═══════════════════════════════════════════════════
function showChat(){
  if(!hasChat){
    hasChat=true;
    document.getElementById('ow').classList.add('up');
    document.getElementById('chat').classList.add('on');
  }
}
function mkBubble(role,content,streaming=false){
  const p=document.getElementById('chat');
  const d=document.createElement('div'); d.className='bb '+role+(streaming?' st':'');
  const l=document.createElement('div'); l.className='lb'; l.textContent=role==='U'?'You':'Daisy';
  const b=document.createElement('div'); b.className='body'; b.textContent=content;
  d.appendChild(l); d.appendChild(b); p.appendChild(d); scrollBot(); return d;
}
function mkAlert(title,content){
  const p=document.getElementById('chat');
  const d=document.createElement('div'); d.className='bb AL';
  d.innerHTML=`<div class="at">${title}</div><div class="body">${content}</div>`;
  p.appendChild(d); scrollBot(); showChat();
}
function addSys(t){
  const p=document.getElementById('chat');
  const d=document.createElement('div'); d.className='bb SY'; d.textContent=t;
  p.appendChild(d); scrollBot();
}
function scrollBot(){ const p=document.getElementById('chat'); p.scrollTop=p.scrollHeight; }

// ═══ connection ════════════════════════════════════════════════════
function conn(cls,text){
  const e=document.getElementById('cd'); e.className=cls;
  document.getElementById('cl').textContent=text;
  if(cls==='er') setOrb('E');
  else if(!vadRecording&&!isPlaying) resetOrb();
}

const b2b=b=>new Promise((res,rej)=>{
  const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(b);
});

if('Notification'in window && Notification.permission==='default') Notification.requestPermission();
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ stopAll(); closeCP(); } });
</script>
</body>
</html>
