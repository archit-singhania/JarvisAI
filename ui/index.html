<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Girl Wednesday</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --black:#050509;
  --void:#07080f;
  --ink:#0a0b14;
  --deep:#0d0f1a;
  --panel:#10121f;
  --card:#141728;
  --lift:#191d30;
  --edge:#1e2438;
  --rim:#242c45;
  --muted:#2d3554;

  --rose:#e8719a;
  --rose-d:#c4547a;
  --rose-l:#f4a7c3;
  --violet:#9270f5;
  --violet-l:#b8a2ff;
  --violet-d:#6b4fd4;
  --gold:#d4a96a;
  --gold-l:#e8c48a;
  --sky:#5bc4e8;
  --mint:#48daa0;

  --glow-rose:rgba(232,113,154,.35);
  --glow-violet:rgba(146,112,245,.35);
  --glow-gold:rgba(212,169,106,.25);

  --grad-w:linear-gradient(135deg,#9270f5 0%,#e8719a 50%,#d4a96a 100%);

  --t1:#f0eff8;
  --t2:#a09db8;
  --t3:#5a566e;
  --t4:#33304a;

  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;

  --ease-out-expo:cubic-bezier(.16,1,.3,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
}

html,body{height:100%;overflow:hidden;background:var(--void);color:var(--t1);
  font-family:var(--sans);-webkit-font-smoothing:antialiased}

/* noise */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.022;pointer-events:none;z-index:9999;
}

/* aurora */
#aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0;animation:blobFloat 18s ease-in-out infinite;}
.blob1{width:500px;height:500px;left:-10%;top:20%;background:radial-gradient(circle,rgba(146,112,245,.12),transparent 70%);animation-duration:22s;}
.blob2{width:600px;height:400px;right:-15%;bottom:10%;background:radial-gradient(circle,rgba(232,113,154,.10),transparent 70%);animation-delay:-8s;animation-duration:26s;}
.blob3{width:400px;height:600px;left:40%;top:-20%;background:radial-gradient(circle,rgba(212,169,106,.07),transparent 70%);animation-delay:-14s;animation-duration:20s;}
@keyframes blobFloat{0%{opacity:0;transform:translate(0,0) scale(1)}20%{opacity:1}50%{transform:translate(30px,-20px) scale(1.08)}80%{opacity:.8}100%{opacity:0;transform:translate(-10px,15px) scale(.95)}}

/* shell */
#shell{
  position:relative;z-index:1;
  display:grid;
  grid-template-rows:56px 1fr auto;
  height:100vh;
  overflow:hidden;
}

/* ── TOPBAR ── */
#topbar{
  display:flex;align-items:center;
  padding:0 28px;gap:16px;
  border-bottom:1px solid rgba(255,255,255,.04);
  background:linear-gradient(180deg,rgba(7,8,15,.96),rgba(7,8,15,.7));
  backdrop-filter:blur(24px);
  position:relative;z-index:10;
}
.tb-logo{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.tb-glyph{
  width:32px;height:32px;border-radius:50%;
  background:var(--grad-w);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px var(--glow-rose),0 0 32px var(--glow-violet);
  position:relative;flex-shrink:0;
}
.tb-glyph::after{content:'W';font-family:var(--serif);font-size:15px;font-weight:500;color:rgba(255,255,255,.9);position:absolute;}
.tb-glyph.listening{animation:glyphListen .9s ease-in-out infinite alternate;}
@keyframes glyphListen{from{box-shadow:0 0 16px var(--glow-rose),0 0 32px var(--glow-violet)}to{box-shadow:0 0 32px var(--glow-rose),0 0 64px var(--glow-violet),0 0 96px var(--glow-rose)}}
.tb-wordmark{display:flex;flex-direction:column;gap:1px;}
.tb-name{font-family:var(--serif);font-size:16px;font-weight:400;font-style:italic;letter-spacing:.5px;background:var(--grad-w);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.tb-sub{font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--t3);line-height:1;}
.tb-spacer{flex:1;}

#status-pill{
  display:flex;align-items:center;gap:8px;
  padding:5px 14px;
  background:var(--card);border:1px solid var(--edge);border-radius:100px;
  font-size:11px;color:var(--t3);font-weight:400;letter-spacing:.3px;
  transition:all .3s var(--ease-out-expo);
}
#status-pill .pip{width:5px;height:5px;border-radius:50%;background:var(--t4);transition:all .3s;flex-shrink:0;}
#status-pill.connected .pip{background:var(--mint);box-shadow:0 0 6px var(--mint);}
#status-pill.listening .pip{background:var(--violet);box-shadow:0 0 8px var(--violet);animation:pipBlink .6s ease-in-out infinite alternate;}
#status-pill.thinking  .pip{background:var(--gold);box-shadow:0 0 8px var(--gold);}
#status-pill.speaking  .pip{background:var(--rose);box-shadow:0 0 8px var(--rose);}
#status-pill.error     .pip{background:#f87171;box-shadow:0 0 6px #f87171;}
@keyframes pipBlink{from{opacity:.4}to{opacity:1}}

#btn-clear{
  display:flex;align-items:center;gap:6px;
  background:none;border:1px solid var(--edge);
  color:var(--t3);font-family:var(--sans);font-size:11px;font-weight:400;
  padding:5px 12px;border-radius:8px;cursor:pointer;letter-spacing:.3px;
  transition:all .2s;
}
#btn-clear:hover{border-color:var(--rim);color:var(--t2);}

/* ── CANVAS ── */
#canvas{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:36px;
  overflow:hidden;position:relative;
  padding:24px;
}

/* ── ORB SCENE ── */
#orb-scene{
  display:flex;flex-direction:column;
  align-items:center;
  gap:0;
  flex-shrink:0;
}

.orb-rings{
  position:relative;width:200px;height:200px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.orb-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(146,112,245,.15);
  animation:ringExpand 3s ease-out infinite;
}
.orb-ring:nth-child(1){width:160px;height:160px;animation-delay:0s;}
.orb-ring:nth-child(2){width:200px;height:200px;animation-delay:1s;border-color:rgba(232,113,154,.1);}
.orb-ring:nth-child(3){width:240px;height:240px;animation-delay:2s;border-color:rgba(212,169,106,.06);}
@keyframes ringExpand{0%{transform:scale(.85);opacity:.7}100%{transform:scale(1.15);opacity:0}}

#orb{
  width:110px;height:110px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#c4a8ff,#9270f5 35%,#e8719a 65%,#d4a96a 90%);
  box-shadow:0 0 40px var(--glow-violet),0 0 80px var(--glow-rose),0 0 120px rgba(212,169,106,.15),inset 0 0 30px rgba(255,255,255,.08),inset 0 -20px 40px rgba(0,0,0,.3);
  position:relative;z-index:2;
  transition:transform .2s var(--ease-spring),box-shadow .4s;
}
#orb::after{content:'';position:absolute;width:35%;height:20%;background:rgba(255,255,255,.18);border-radius:50%;top:22%;left:20%;filter:blur(6px);transform:rotate(-25deg);}

#orb.listening{animation:orbPulse .9s ease-in-out infinite alternate;}
@keyframes orbPulse{from{transform:scale(1);box-shadow:0 0 40px var(--glow-violet),0 0 80px var(--glow-rose)}to{transform:scale(1.06);box-shadow:0 0 70px var(--glow-violet),0 0 140px var(--glow-rose),0 0 180px rgba(146,112,245,.15)}}

#orb.thinking{animation:orbThink 1.5s linear infinite;}
@keyframes orbThink{0%{filter:hue-rotate(0deg) brightness(1)}50%{filter:hue-rotate(30deg) brightness(1.1)}100%{filter:hue-rotate(0deg) brightness(1)}}

#orb.speaking{
  animation:orbSpeak .5s ease-in-out infinite alternate;
  background:radial-gradient(circle at 35% 30%,#f9c4d8,#e8719a 35%,#9270f5 65%,#d4a96a 90%);
}
@keyframes orbSpeak{from{transform:scale(1);box-shadow:0 0 50px var(--glow-rose),0 0 100px var(--glow-violet)}to{transform:scale(1.04);box-shadow:0 0 80px var(--glow-rose),0 0 160px var(--glow-violet),0 0 200px rgba(212,169,106,.1)}}

/* VAD waveform */
#vad-wave{
  display:flex;align-items:center;justify-content:center;
  gap:2.5px;height:28px;margin-top:18px;
  opacity:0;transition:opacity .4s;
}
#vad-wave.active{opacity:1;}
.vbar{width:2.5px;border-radius:2px;background:linear-gradient(180deg,var(--violet),var(--rose));height:4px;transition:height .07s ease;}

/* Orb label */
#orb-label{
  margin-top:14px;
  font-family:var(--serif);font-size:17px;font-weight:300;font-style:italic;
  color:var(--t3);letter-spacing:.5px;text-align:center;
  opacity:0;transition:opacity .4s;min-height:24px;
}
#orb-label.show{opacity:1;}

/* ── RESPONSE AREA (replaces chat feed) ── */
#response-area{
  width:100%;max-width:620px;
  min-height:90px;
  display:flex;align-items:flex-start;justify-content:center;
  padding:0 16px;
  position:relative;
}

#response-text{
  font-family:var(--serif);
  font-size:18px;font-weight:300;
  line-height:1.72;
  color:var(--t1);
  text-align:center;
  opacity:0;
  transform:translateY(8px);
  transition:opacity .45s var(--ease-out-expo),transform .45s var(--ease-out-expo);
  white-space:pre-wrap;
  word-break:break-word;
}
#response-text.show{opacity:1;transform:translateY(0);}
#response-text.transcript-mode{
  font-size:14px;font-style:italic;color:var(--t3);
}

/* VAD indicator (bottom hint) */
#vad-indicator{
  display:flex;align-items:center;gap:6px;
  font-size:10.5px;color:var(--t4);letter-spacing:.3px;
  opacity:0;transition:opacity .4s;
}
#vad-indicator.show{opacity:1;}
#vad-indicator .vad-pip{width:5px;height:5px;border-radius:50%;background:var(--t4);transition:all .3s;}
#vad-indicator.active .vad-pip{background:var(--mint);box-shadow:0 0 6px var(--mint);animation:vadBlink 1.4s ease-in-out infinite;}
@keyframes vadBlink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── INPUT BAR ── */
#input-area{
  padding:10px 20px 18px;
  flex-shrink:0;position:relative;z-index:5;
}
#input-area::before{
  content:'';position:absolute;left:0;right:0;top:-50px;height:50px;
  background:linear-gradient(transparent,var(--void));
  pointer-events:none;
}
#input-shell{max-width:620px;margin:0 auto;}
#input-row{
  display:flex;align-items:flex-end;gap:8px;
  background:var(--card);border:1px solid var(--edge);border-radius:20px;
  padding:10px 10px 10px 18px;
  transition:border-color .25s,box-shadow .25s;
}
#input-row:focus-within{border-color:rgba(146,112,245,.4);box-shadow:0 0 0 3px rgba(146,112,245,.07),0 8px 32px rgba(0,0,0,.3);}
#input-row.voice-active{
  border-color:rgba(232,113,154,.5);
  box-shadow:0 0 0 3px rgba(232,113,154,.08),0 0 24px rgba(232,113,154,.1);
  animation:voiceGlow 1.2s ease-in-out infinite alternate;
}
@keyframes voiceGlow{from{box-shadow:0 0 0 3px rgba(232,113,154,.08),0 0 24px rgba(232,113,154,.1)}to{box-shadow:0 0 0 3px rgba(146,112,245,.1),0 0 32px rgba(146,112,245,.12)}}

#txt-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--t1);font-family:var(--sans);font-size:14px;font-weight:300;
  line-height:1.5;resize:none;min-height:22px;max-height:100px;overflow-y:auto;
}
#txt-input::placeholder{color:var(--t4);font-style:italic;}
#txt-input::-webkit-scrollbar{width:0;}

.act-btn{
  width:38px;height:38px;border-radius:12px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s var(--ease-spring);
}
.act-btn:active{transform:scale(.92)!important;}
.act-btn:disabled{opacity:.3;cursor:not-allowed;}
#btn-mic{background:var(--grad-w);color:#fff;box-shadow:0 2px 12px var(--glow-violet);}
#btn-mic:hover{transform:scale(1.06);box-shadow:0 4px 20px var(--glow-rose);}
#btn-mic.rec{background:linear-gradient(135deg,#e8719a,#c4547a);animation:micGlow .6s ease-in-out infinite alternate;}
@keyframes micGlow{from{box-shadow:0 2px 12px rgba(232,113,154,.4)}to{box-shadow:0 4px 24px rgba(232,113,154,.8),0 0 40px rgba(232,113,154,.3)}}
#btn-send{background:var(--lift);border:1px solid var(--edge);color:var(--t3);}
#btn-send:not(:disabled):hover{background:var(--edge);color:var(--t2);transform:scale(1.04);}

#hint-row{display:flex;align-items:center;justify-content:center;margin-top:10px;gap:6px;}

/* ── TOASTS ── */
#toasts{position:fixed;top:68px;right:18px;z-index:9900;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{
  background:var(--card);border:1px solid var(--edge);border-radius:12px;
  padding:10px 16px;font-size:12px;color:var(--t2);max-width:280px;
  pointer-events:all;box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:toastSlide .3s var(--ease-out-expo);position:relative;overflow:hidden;
}
.toast::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.toast.info::before{background:var(--violet);}
.toast.warn::before{background:var(--gold);}
.toast.err::before{background:#f87171;}
.toast.ok::before{background:var(--mint);}
@keyframes toastSlide{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}

.hidden{display:none!important;}
</style>
</head>
<body>

<div id="aurora">
  <div class="aurora-blob blob1"></div>
  <div class="aurora-blob blob2"></div>
  <div class="aurora-blob blob3"></div>
</div>

<div id="shell">

  <!-- TOPBAR -->
  <header id="topbar">
    <div class="tb-logo">
      <div class="tb-glyph" id="tb-glyph"></div>
      <div class="tb-wordmark">
        <span class="tb-name">Girl Wednesday</span>
        <span class="tb-sub">AI Assistant</span>
      </div>
    </div>
    <div class="tb-spacer"></div>
    <div id="status-pill" class="error">
      <div class="pip"></div>
      <span id="status-txt">Connecting…</span>
    </div>
    <button id="btn-clear" onclick="clearConv()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0M12 8v4M12 16h.01"/></svg>
      New conversation
    </button>
  </header>

  <!-- CANVAS -->
  <main id="canvas">

    <!-- Orb — always visible, never sinks -->
    <div id="orb-scene">
      <div class="orb-rings" onclick="forceListen()" title="Click to speak">
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div id="orb"></div>
      </div>
      <div id="vad-wave">
        <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
        <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
        <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
        <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
        <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
      </div>
      <div id="orb-label"></div>
    </div>

    <!-- Response area — floating text below orb, no history -->
    <div id="response-area">
      <div id="response-text"></div>
    </div>

  </main>

  <!-- INPUT BAR -->
  <footer id="input-area">
    <div id="input-shell">
      <div id="input-row">
        <textarea id="txt-input" placeholder="Message Wednesday…" rows="1"
          onkeydown="onKey(event)" oninput="grow(this)"></textarea>
        <button class="act-btn" id="btn-mic" onclick="toggleMic()" title="Speak">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0M12 19v3M9 22h6"/>
          </svg>
        </button>
        <button class="act-btn" id="btn-send" onclick="sendText()" disabled title="Send">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
      </div>
      <div id="hint-row">
        <div id="vad-indicator">
          <div class="vad-pip"></div>
          <span id="vad-txt">Waiting for microphone…</span>
        </div>
      </div>
    </div>
  </footer>

</div>

<div id="toasts"></div>

<script>
/* ================================================================
   GIRL WEDNESDAY — Frontend v10 (Siri-style, no chat history)
   • Pure orb + floating response text — no bubbles, no history
   • VAD: 1.8s silence gate + RMS energy threshold
   • Interrupt: speak while Wednesday talks → she stops instantly
   • Audio queue: sentence-level, plays immediately as chunks arrive
   • Double-response fix: stream_end never re-renders content
================================================================ */

const WS_URL = 'ws://localhost:8000/ws';

// ── VAD tuning (KEY FIX: longer silence before submit) ───────────
const VAD_ON           = 0.022;   // RMS to START recording (energy gate)
const VAD_OFF          = 0.011;   // RMS silence threshold
const SILENCE_FRAMES   = 55;      // ~1.8s at ~33ms/frame before auto-submit
const INTERRUPT_THRESH = VAD_ON * 1.8; // energy needed to interrupt playback

// ── State ────────────────────────────────────────────────────────
let socket = null, connected = false;
let vadStream = null, vadCtx = null, vadAnal = null, vadActive = false;
let isRec = false, mediaRec = null, chunks = [];
let playQ = [], playing = false, curAudio = null;
let streamBuf = '';
let orbState = 'idle';
let _responseShowTimer = null;

// ── DOM refs ─────────────────────────────────────────────────────
const txtInput     = document.getElementById('txt-input');
const btnMic       = document.getElementById('btn-mic');
const btnSend      = document.getElementById('btn-send');
const orbEl        = document.getElementById('orb');
const orbLabel     = document.getElementById('orb-label');
const vadWave      = document.getElementById('vad-wave');
const vadIndicator = document.getElementById('vad-indicator');
const vadTxt       = document.getElementById('vad-txt');
const tbGlyph      = document.getElementById('tb-glyph');
const statusPill   = document.getElementById('status-pill');
const statusTxt    = document.getElementById('status-txt');
const responseText = document.getElementById('response-text');

// ── WebSocket ─────────────────────────────────────────────────────
function connect() {
  socket = new WebSocket(WS_URL);
  socket.onopen  = () => { connected = true; setStatus('connected', 'Ready'); initVAD(); };
  socket.onclose = () => { connected = false; setStatus('error', 'Reconnecting…'); setTimeout(connect, 2500); };
  socket.onerror = () => { connected = false; setStatus('error', 'Error'); };
  socket.onmessage = e => dispatch(JSON.parse(e.data));
}
function send(obj) { if (connected) socket.send(JSON.stringify(obj)); }

// ── Message dispatcher ────────────────────────────────────────────
function dispatch(d) {
  switch (d.type) {

    case 'response':
      // Non-stream response (greeting, tool, mood ack)
      showResponse(d.content);
      setTimeout(() => setOrb('idle'), 200);
      break;

    case 'stream_start':
      streamBuf = '';
      hideResponse();
      setOrb('thinking');
      break;

    case 'stream_chunk':
      if (d.content) {
        streamBuf += d.content;
        showResponse(streamBuf);  // live update — no bubble, just text
        setOrb('speaking');
      }
      break;

    case 'stream_end':
      // Content already displayed via stream_chunk — do NOT re-render
      setOrb('idle');
      break;

    case 'stream_interrupted':
      setOrb('listening');
      break;

    case 'audio_chunk':
      if (d.audio_b64) enqueueAudio(d.audio_b64, d.audio_format || 'mp3');
      break;

    case 'transcript':
      showResponse('"' + d.content + '"', true);  // italic transcript style
      setOrb('thinking');
      break;

    case 'stt_start':
      setOrb('listening');
      setLabel('Processing…');
      break;

    case 'stt_error':
      setOrb('idle');
      setLabel('');
      toast("Didn't catch that — try again", 'warn');
      break;

    case 'interrupted':
      clearAudio();
      setOrb('idle');
      setLabel('');
      break;

    case 'wake_detected':
      setOrb('listening');
      setLabel('Listening…');
      break;

    case 'code_interrupt':
    case 'code_feedback':
      showResponse(d.content);
      if (d.audio_b64) enqueueAudio(d.audio_b64, d.audio_format || 'mp3');
      break;

    case 'reminder':
      toast('⏰ ' + d.content, 'info');
      showResponse(d.content);
      break;

    case 'cleared':
      hideResponse();
      streamBuf = '';
      setOrb('idle');
      setLabel('');
      break;
  }
}

// ── Response text (replaces entire chat feed) ─────────────────────
function showResponse(text, isTranscript = false) {
  if (!text || !text.trim()) return;
  clearTimeout(_responseShowTimer);
  // Snap update if already visible, fade-in if new
  if (responseText.classList.contains('show') && !isTranscript) {
    responseText.textContent = text;
    responseText.className = 'show';
  } else {
    responseText.classList.remove('show');
    _responseShowTimer = setTimeout(() => {
      responseText.textContent = text;
      responseText.className = isTranscript ? 'transcript-mode show' : 'show';
    }, responseText.classList.contains('show') ? 120 : 50);
  }
}

function hideResponse() {
  responseText.classList.remove('show', 'transcript-mode');
}

// ── Orb / Status ──────────────────────────────────────────────────
function setOrb(state) {
  orbState = state;
  orbEl.className = state === 'idle' ? '' : state;

  const cfg = {
    idle:      ['connected', 'Ready',         false, false],
    listening: ['listening', 'Listening…',     true,  true ],
    thinking:  ['thinking',  'Thinking…',      false, false],
    speaking:  ['speaking',  'Speaking…',      false, false],
  };
  const [sc, stxt, wave, lbl] = cfg[state] || cfg.idle;
  setStatus(sc, stxt);
  vadWave.classList.toggle('active', wave);
  tbGlyph.className = 'tb-glyph' + (state === 'listening' ? ' listening' : '');
  if (!lbl) setLabel('');
}

function setStatus(cls, txt) {
  statusPill.className = cls;
  statusTxt.textContent = txt;
}

function setLabel(txt) {
  orbLabel.textContent = txt;
  orbLabel.classList.toggle('show', !!txt);
}

// ── Audio queue ───────────────────────────────────────────────────
function enqueueAudio(b64, fmt) {
  playQ.push({ b64, fmt });
  if (!playing) playNext();
}

function playNext() {
  if (!playQ.length) {
    playing = false;
    if (orbState === 'speaking') setOrb('idle');
    return;
  }
  playing = true;
  setOrb('speaking');
  const { b64, fmt } = playQ.shift();
  try {
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([arr], { type: 'audio/' + fmt }));
    const a = new Audio(url);
    curAudio = a;
    a.onended = () => { URL.revokeObjectURL(url); curAudio = null; playNext(); };
    a.onerror = () => { URL.revokeObjectURL(url); curAudio = null; playNext(); };
    a.play().catch(() => { playing = false; curAudio = null; playNext(); });
  } catch (e) {
    curAudio = null;
    playNext();
  }
}

function clearAudio() {
  playQ = [];
  if (curAudio) { curAudio.pause(); curAudio = null; }
  playing = false;
}

// ── VAD — always listening, 1.8s silence gate ──────────────────────
async function initVAD() {
  if (vadActive) return;
  try {
    vadStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 },
      video: false,
    });
    vadCtx  = new AudioContext({ sampleRate: 16000 });
    const src = vadCtx.createMediaStreamSource(vadStream);
    vadAnal   = vadCtx.createAnalyser();
    vadAnal.fftSize = 512;
    vadAnal.smoothingTimeConstant = 0.65;
    src.connect(vadAnal);
    vadActive   = true;

    vadIndicator.classList.add('show', 'active');
    vadTxt.textContent = 'Always listening — speak naturally';

    const fbuf = new Float32Array(vadAnal.fftSize);
    let silCount = 0, speaking = false;

    function tick() {
      if (!vadActive) return;
      requestAnimationFrame(tick);
      vadAnal.getFloatTimeDomainData(fbuf);

      // Compute RMS energy
      let rms = 0;
      for (let i = 0; i < fbuf.length; i++) rms += fbuf[i] * fbuf[i];
      rms = Math.sqrt(rms / fbuf.length);

      // Animate vbars when recording
      if (isRec) {
        const bars = vadWave.querySelectorAll('.vbar');
        bars.forEach(b => {
          b.style.height = Math.max(3, Math.min(26, rms * 440 + Math.random() * 5)) + 'px';
        });
      }

      // INTERRUPT: user speaks while Wednesday is playing → stop her
      if ((playing || orbState === 'speaking') && rms > INTERRUPT_THRESH && !isRec) {
        clearAudio();
        send({ type: 'interrupt' });
        setOrb('listening');
        beginRecording();
        return;
      }

      // Auto-stop: silence for SILENCE_FRAMES after speech started
      if (isRec) {
        if (rms < VAD_OFF) { silCount++; }
        else               { silCount = 0; }
        if (silCount > SILENCE_FRAMES) stopRecording();
        return;
      }

      // Auto-start: energy above gate AND not already recording
      if (rms > VAD_ON && !speaking && !isRec) {
        speaking = true;
        silCount = 0;
        beginRecording();
      }
      if (rms < VAD_OFF && speaking) speaking = false;
    }
    tick();

  } catch (err) {
    vadIndicator.classList.add('show');
    vadTxt.textContent = 'Mic unavailable — click 🎙 to speak';
    vadIndicator.querySelector('.vad-pip').style.background = '#f87171';
  }
}

function beginRecording() {
  if (isRec || !vadStream) return;
  isRec   = true;
  chunks  = [];
  setOrb('listening');
  setLabel('Listening…');
  btnMic.classList.add('rec');
  document.getElementById('input-row').classList.add('voice-active');

  try {
    mediaRec = new MediaRecorder(vadStream, { mimeType: 'audio/webm;codecs=opus' });
  } catch {
    mediaRec = new MediaRecorder(vadStream);
  }
  mediaRec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mediaRec.onstop = emitVoice;
  mediaRec.start(200);
  setTimeout(() => { if (isRec) stopRecording(); }, 90000);
}

function stopRecording() {
  if (!isRec || !mediaRec) return;
  isRec = false;
  mediaRec.stop();
  mediaRec = null;
  btnMic.classList.remove('rec');
  document.getElementById('input-row').classList.remove('voice-active');
  setOrb('thinking');
  setLabel('Transcribing…');
}

function emitVoice() {
  if (!chunks.length) { setOrb('idle'); setLabel(''); return; }
  const blob = new Blob(chunks, { type: 'audio/webm' });
  if (blob.size < 800) { setOrb('idle'); setLabel(''); return; }
  const r = new FileReader();
  r.onload = () => send({ type: 'audio', audio_b64: r.result.split(',')[1] });
  r.readAsDataURL(blob);
}

// ── Manual mic ────────────────────────────────────────────────────
function toggleMic() {
  if (isRec) { stopRecording(); return; }
  if (vadActive) { beginRecording(); return; }
  initVAD().then(() => setTimeout(beginRecording, 300));
}
function forceListen() {
  if (isRec) { stopRecording(); return; }
  if (!vadActive) { initVAD().then(() => setTimeout(beginRecording, 300)); return; }
  beginRecording();
}

// ── Text input ────────────────────────────────────────────────────
txtInput.addEventListener('input', () => { btnSend.disabled = !txtInput.value.trim(); });

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
}

function sendText() {
  const t = txtInput.value.trim();
  if (!t || !connected) return;
  showResponse('"' + t + '"', true);  // show user's text as transcript briefly
  send({ type: 'text', content: t, tts: true });
  txtInput.value = '';
  grow(txtInput);
  btnSend.disabled = true;
  setOrb('thinking');
}

function grow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ── Clear ─────────────────────────────────────────────────────────
function clearConv() { clearAudio(); send({ type: 'clear' }); }

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const box = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  box.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity .4s,transform .4s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(12px)';
    setTimeout(() => el.remove(), 420);
  }, 3800);
}

// ── Boot ──────────────────────────────────────────────────────────
connect();
</script>
